# Database — values come from environment variables (set these in Render/Railway)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# FIX: Added dialect — required for PostgreSQL with Spring Boot 3.x
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Auto-create/update tables on startup
spring.jpa.hibernate.ddl-auto=update

# Show SQL in logs (disable in production by setting to false)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# FIX: Added server port (Render expects 8080 by default)
server.port=${PORT:8080}

# FIX: Added app name for Spring Boot banner
spring.application.name=taskmanager