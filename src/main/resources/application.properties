# -------------------------------------------------------
# Server
# -------------------------------------------------------
server.port=${PORT:8080}

# -------------------------------------------------------
# Database — values come from Render environment variables
# Set these in Render dashboard: DB_URL, DB_USERNAME, DB_PASSWORD
# -------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------------------------------------------
# JWT — set JWT_SECRET in Render environment variables
# -------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.secret=mysupersecretkey123456789